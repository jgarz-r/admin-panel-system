
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: #f0f0f0; color: #1a1a1a; }
    :root {
      --bg: #f0f0f0; --surface: #ffffff; --border: #d0d0d0;
      --muted: #888; --accent: #1a4a8a; --accent-lt: #e8eef8;
      --danger: #8a1a1a; --success: #1a6a2a;
      --mono: 'IBM Plex Mono', monospace;
    }
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 220px; min-width: 220px; background: #1c1c1c; color: #ccc;
      display: flex; flex-direction: column; border-right: 1px solid #333; overflow-y: auto;
    }
    .sidebar-brand {
      padding: 20px 18px 16px; font-family: var(--mono); font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; color: #fff;
      border-bottom: 1px solid #333;
    }
    .sidebar-brand span { color: #5588cc; }
    .sidebar-section { padding: 14px 0 4px; }
    .sidebar-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #555; padding: 0 18px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 18px;
      font-size: 13px; cursor: pointer; color: #999;
      border-left: 2px solid transparent; transition: background .1s, color .1s;
    }
    .nav-item:hover { background: #2a2a2a; color: #fff; }
    .nav-item.active { background: #222a36; color: #fff; border-left-color: #5588cc; }
    .nav-icon { font-size: 14px; width: 18px; text-align: center; }
    .sidebar-user { margin-top: auto; padding: 14px 18px; border-top: 1px solid #333; font-size: 12px; color: #666; }
    .sidebar-user strong { display: block; color: #ccc; font-size: 13px; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 52px; min-height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title { font-size: 14px; font-weight: 600; letter-spacing: .5px; }
    .topbar-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .content { flex: 1; overflow-y: auto; padding: 28px; }
    .panel { background: var(--surface); border: 1px solid var(--border); margin-bottom: 20px; }
    .panel-head {
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; background: #fafafa;
    }
    .panel-title { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #444; }
    .panel-body { padding: 18px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 20px; }
    .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 600; font-family: var(--mono); color: #1a1a1a; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 9px 14px; font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); background: #fafafa;
      border-bottom: 1px solid var(--border); font-weight: 600;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f8f8; }
    .badge {
      display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase; border-radius: 2px; font-family: var(--mono);
    }
    .badge-active   { background: #d4edda; color: #1a5a2a; }
    .badge-inactive { background: #eee; color: #666; }
    .badge-pending  { background: #fff3cd; color: #7a5a00; }
    .badge-admin    { background: #e8eef8; color: var(--accent); }
    .badge-editor   { background: #f0e8f8; color: #5a1a8a; }
    .badge-viewer   { background: #e8f4f8; color: #1a5a6a; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
      font-size: 12px; font-weight: 500; border: 1px solid var(--border); cursor: pointer;
      background: var(--surface); color: #333; font-family: inherit;
      transition: background .1s; border-radius: 2px;
    }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #163d75; }
    .btn-danger  { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #6a1010; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    input, select, textarea {
      width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--border);
      background: var(--surface); color: #1a1a1a; font-family: inherit; border-radius: 2px; outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: #555; margin-bottom: 5px; }
    .form-row { margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      width: 480px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-head {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; background: #fafafa;
    }
    .modal-title { font-size: 13px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-foot {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px; background: #fafafa;
    }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f0f0; }
    .login-box { background: var(--surface); border: 1px solid var(--border); width: 360px; padding: 36px; }
    .login-brand { font-family: var(--mono); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
    .login-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-error { font-size: 12px; color: var(--danger); margin-top: 8px; }
    .log-action {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      letter-spacing: .5px; padding: 2px 7px; border-radius: 2px; display: inline-block;
    }
    .log-ts { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 12px; }
    .bar-label { width: 100px; color: #555; text-align: right; font-size: 11px; font-family: var(--mono); }
    .bar-track { flex: 1; height: 14px; background: #eee; border-radius: 1px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width .4s; }
    .bar-val { width: 30px; font-family: var(--mono); font-size: 11px; color: #333; }
    .role-row { display: flex; align-items: flex-start; padding: 14px 18px; border-bottom: 1px solid #eee; gap: 16px; }
    .role-row:last-child { border-bottom: none; }
    .role-perms { display: flex; flex-wrap: wrap; gap: 6px; }
    .perm-tag { font-size: 10px; padding: 2px 7px; background: #eee; color: #444; border-radius: 2px; font-family: var(--mono); }
    .confirm-text { font-size: 13px; color: #333; line-height: 1.6; }
    .confirm-target { font-weight: 600; color: var(--danger); }
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #ccc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── Data ──────────────────────────────────────────────────────────────────

    const ROLES = ["Admin", "Editor", "Viewer"];

    const INITIAL_USERS = [
      { id: 1, name: "Ada Lovelace",   email: "ada@corp.io",     role: "Admin",  status: "Active",   joined: "2024-01-12" },
      { id: 2, name: "Grace Hopper",   email: "grace@corp.io",   role: "Editor", status: "Active",   joined: "2024-02-03" },
      { id: 3, name: "Alan Turing",    email: "alan@corp.io",    role: "Viewer", status: "Inactive", joined: "2024-03-18" },
      { id: 4, name: "Dennis Ritchie", email: "dennis@corp.io",  role: "Editor", status: "Active",   joined: "2024-04-07" },
      { id: 5, name: "Linus Torvalds", email: "linus@corp.io",   role: "Admin",  status: "Active",   joined: "2024-05-22" },
      { id: 6, name: "Margaret H.",    email: "margaret@corp.io",role: "Viewer", status: "Pending",  joined: "2024-06-01" },
    ];

    const INITIAL_LOGS = [
      { id: 1, ts: "2026-04-09 08:14:22", user: "ada@corp.io",    action: "LOGIN",         detail: "Successful login from 192.168.1.4" },
      { id: 2, ts: "2026-04-09 08:22:11", user: "grace@corp.io",  action: "RECORD_UPDATE", detail: "Updated user #3 status → Inactive" },
      { id: 3, ts: "2026-04-09 09:01:44", user: "linus@corp.io",  action: "RECORD_CREATE", detail: "Created user margaret@corp.io" },
      { id: 4, ts: "2026-04-09 09:33:05", user: "ada@corp.io",    action: "ROLE_CHANGE",   detail: "Changed dennis@corp.io role → Editor" },
      { id: 5, ts: "2026-04-09 10:15:58", user: "alan@corp.io",   action: "LOGIN_FAILED",  detail: "Invalid credentials from 10.0.0.2" },
      { id: 6, ts: "2026-04-09 11:02:30", user: "grace@corp.io",  action: "RECORD_DELETE", detail: "Deleted record ID #88" },
      { id: 7, ts: "2026-04-09 11:44:17", user: "linus@corp.io",  action: "EXPORT",        detail: "Exported users CSV (6 records)" },
      { id: 8, ts: "2026-04-09 12:00:00", user: "ada@corp.io",    action: "LOGOUT",        detail: "Session ended" },
    ];

    const ACTION_COLOR = {
      LOGIN: "#2a7a2a", LOGOUT: "#666", LOGIN_FAILED: "#a00",
      RECORD_CREATE: "#1a5fa0", RECORD_UPDATE: "#7a5a00",
      RECORD_DELETE: "#a00", ROLE_CHANGE: "#5a1a8a", EXPORT: "#1a6a6a",
    };

    const ROLE_PERMS = {
      Admin:  ["users.read","users.write","users.delete","roles.manage","logs.view","analytics.view","settings.manage"],
      Editor: ["users.read","users.write","logs.view","analytics.view"],
      Viewer: ["users.read","analytics.view"],
    };

    const TITLES = {
      dashboard: "Dashboard Overview", users: "User Management",
      roles: "Role Management", logs: "Activity Log", analytics: "Analytics",
    };

    // ── Helpers ───────────────────────────────────────────────────────────────

    function StatusBadge({ status }) {
      const cls = { Active: "badge-active", Inactive: "badge-inactive", Pending: "badge-pending" }[status] || "badge-inactive";
      return <span className={`badge ${cls}`}>{status}</span>;
    }

    function RoleBadge({ role }) {
      const cls = { Admin: "badge-admin", Editor: "badge-editor", Viewer: "badge-viewer" }[role] || "badge-viewer";
      return <span className={`badge ${cls}`}>{role}</span>;
    }

    function now() {
      return new Date().toISOString().replace("T", " ").slice(0, 19);
    }

    // ── Login ─────────────────────────────────────────────────────────────────

    function LoginScreen({ onLogin }) {
      const [email, setEmail] = useState("ada@corp.io");
      const [pass,  setPass]  = useState("password");
      const [err,   setErr]   = useState("");

      function attempt() {
        if (email === "ada@corp.io" && pass === "password") {
          onLogin({ name: "Ada Lovelace", email: "ada@corp.io", role: "Admin" });
        } else {
          setErr("Invalid credentials. (Hint: ada@corp.io / password)");
        }
      }

      return (
        <div className="login-wrap">
          <div className="login-box">
            <div className="login-brand">&#9679; Admin Panel System</div>
            <div className="login-title">Sign In</div>
            <div className="login-sub">Internal management console. Authorized personnel only.</div>
            <div className="form-row">
              <label>Email Address</label>
              <input value={email} onChange={e => { setEmail(e.target.value); setErr(""); }}
                onKeyDown={e => e.key === "Enter" && attempt()} />
            </div>
            <div className="form-row">
              <label>Password</label>
              <input type="password" value={pass} onChange={e => { setPass(e.target.value); setErr(""); }}
                onKeyDown={e => e.key === "Enter" && attempt()} />
            </div>
            {err && <div className="login-error">{err}</div>}
            <div style={{ marginTop: 22 }}>
              <button className="btn btn-primary" style={{ width: "100%" }} onClick={attempt}>Sign In →</button>
            </div>
            <div style={{ marginTop: 16, fontSize: 11, color: "#aaa", fontFamily: "var(--mono)" }}>
              APS v1.0.0 · Internal Use Only
            </div>
          </div>
        </div>
      );
    }

    // ── User Modal ────────────────────────────────────────────────────────────

    function UserModal({ user, onSave, onClose }) {
      const blank = { name: "", email: "", role: "Viewer", status: "Active", joined: new Date().toISOString().slice(0,10) };
      const [form, setForm] = useState(user ? { ...user } : blank);
      function set(k, v) { setForm(f => ({ ...f, [k]: v })); }
      const valid = form.name.trim() && form.email.includes("@");

      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-head">
              <span className="modal-title">{user ? "Edit User" : "Add User"}</span>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-row">
                  <label>Full Name</label>
                  <input value={form.name} onChange={e => set("name", e.target.value)} placeholder="Jane Smith" />
                </div>
                <div className="form-row">
                  <label>Email</label>
                  <input value={form.email} onChange={e => set("email", e.target.value)} placeholder="jane@corp.io" />
                </div>
                <div className="form-row">
                  <label>Role</label>
                  <select value={form.role} onChange={e => set("role", e.target.value)}>
                    {ROLES.map(r => <option key={r}>{r}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label>Status</label>
                  <select value={form.status} onChange={e => set("status", e.target.value)}>
                    {["Active","Inactive","Pending"].map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <label>Joined Date</label>
                <input type="date" value={form.joined} onChange={e => set("joined", e.target.value)} />
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" onClick={() => valid && onSave(form)} disabled={!valid}>
                {user ? "Save Changes" : "Create User"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Confirm Modal ─────────────────────────────────────────────────────────

    function ConfirmModal({ target, onConfirm, onClose }) {
      return (
        <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-head">
              <span className="modal-title">Confirm Delete</span>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">
              <p className="confirm-text">
                Delete user <span className="confirm-target">{target}</span>?
                <br /><span style={{ color: "#888", fontSize: 12 }}>This action cannot be undone.</span>
              </p>
            </div>
            <div className="modal-foot">
              <button className="btn" onClick={onClose}>Cancel</button>
              <button className="btn btn-danger" onClick={onConfirm}>Delete</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────

    function Dashboard({ users, logs }) {
      const active = users.filter(u => u.status === "Active").length;
      const admins = users.filter(u => u.role === "Admin").length;
      const recent = [...logs].reverse().slice(0, 6);

      return (
        <>
          <div className="stats-row">
            {[
              { label: "Total Users",  val: users.length, sub: "Registered accounts" },
              { label: "Active",       val: active,       sub: `${users.length - active} inactive / pending`, color: "#1a6a2a" },
              { label: "Admins",       val: admins,       sub: "Privileged accounts" },
              { label: "Log Events",   val: logs.length,  sub: "Total recorded actions" },
            ].map(s => (
              <div className="stat-card" key={s.label}>
                <div className="stat-label">{s.label}</div>
                <div className="stat-value" style={s.color ? { color: s.color } : {}}>{s.val}</div>
                <div className="stat-sub">{s.sub}</div>
              </div>
            ))}
          </div>

          <div className="panel">
            <div className="panel-head"><span className="panel-title">Recent Activity</span></div>
            <table>
              <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Detail</th></tr></thead>
              <tbody>
                {recent.map(log => (
                  <tr key={log.id}>
                    <td><span className="log-ts">{log.ts}</span></td>
                    <td style={{ fontFamily: "var(--mono)", fontSize: 12 }}>{log.user}</td>
                    <td>
                      <span className="log-action" style={{ background: (ACTION_COLOR[log.action]||"#888")+"22", color: ACTION_COLOR[log.action]||"#888" }}>
                        {log.action}
                      </span>
                    </td>
                    <td style={{ color: "#555" }}>{log.detail}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      );
    }

    // ── Users View ────────────────────────────────────────────────────────────

    function UsersView({ users, setUsers, addLog }) {
      const [search, setSearch]           = useState("");
      const [roleFilter, setRoleFilter]   = useState("All");
      const [statusFilter, setStatusFilter] = useState("All");
      const [modal, setModal]             = useState(null);
      const [confirm, setConfirm]         = useState(null);

      const filtered = useMemo(() => users.filter(u => {
        const q = search.toLowerCase();
        return (!q || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q))
          && (roleFilter === "All" || u.role === roleFilter)
          && (statusFilter === "All" || u.status === statusFilter);
      }), [users, search, roleFilter, statusFilter]);

      function handleSave(form) {
        if (form.id) {
          setUsers(us => us.map(u => u.id === form.id ? form : u));
          addLog("RECORD_UPDATE", `Updated user ${form.email}`);
        } else {
          setUsers(us => [...us, { ...form, id: Date.now() }]);
          addLog("RECORD_CREATE", `Created user ${form.email}`);
        }
        setModal(null);
      }

      function doDelete() {
        setUsers(us => us.filter(u => u.id !== confirm.id));
        addLog("RECORD_DELETE", `Deleted user ${confirm.email}`);
        setConfirm(null);
      }

      return (
        <>
          {modal && <UserModal user={modal === "add" ? null : modal} onSave={handleSave} onClose={() => setModal(null)} />}
          {confirm && <ConfirmModal target={confirm.name} onConfirm={doDelete} onClose={() => setConfirm(null)} />}

          <div className="panel">
            <div className="panel-head">
              <span className="panel-title">Users ({filtered.length})</span>
              <button className="btn btn-primary btn-sm" onClick={() => setModal("add")}>+ Add User</button>
            </div>
            <div style={{ padding: "14px 18px", borderBottom: "1px solid var(--border)" }}>
              <div className="toolbar">
                <input style={{ width: 220 }} placeholder="Search name or email…" value={search} onChange={e => setSearch(e.target.value)} />
                <select style={{ width: 130 }} value={roleFilter} onChange={e => setRoleFilter(e.target.value)}>
                  <option value="All">All Roles</option>
                  {ROLES.map(r => <option key={r}>{r}</option>)}
                </select>
                <select style={{ width: 140 }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                  {["All","Active","Inactive","Pending"].map(s => <option key={s} value={s}>{s === "All" ? "All Statuses" : s}</option>)}
                </select>
                {(search || roleFilter !== "All" || statusFilter !== "All") && (
                  <button className="btn btn-sm" onClick={() => { setSearch(""); setRoleFilter("All"); setStatusFilter("All"); }}>Clear</button>
                )}
              </div>
            </div>
            {filtered.length === 0
              ? <div className="empty">No users match the current filters.</div>
              : (
                <table>
                  <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th style={{ textAlign:"right" }}>Actions</th></tr></thead>
                  <tbody>
                    {filtered.map(u => (
                      <tr key={u.id}>
                        <td style={{ fontWeight: 500 }}>{u.name}</td>
                        <td style={{ fontFamily: "var(--mono)", fontSize: 12, color: "#555" }}>{u.email}</td>
                        <td><RoleBadge role={u.role} /></td>
                        <td><StatusBadge status={u.status} /></td>
                        <td style={{ fontFamily: "var(--mono)", fontSize: 12, color: "#888" }}>{u.joined}</td>
                        <td style={{ textAlign:"right" }}>
                          <button className="btn btn-sm" style={{ marginRight: 6 }} onClick={() => setModal(u)}>Edit</button>
                          <button className="btn btn-sm" style={{ color:"var(--danger)", borderColor:"#e0b0b0" }} onClick={() => setConfirm(u)}>Delete</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
          </div>
        </>
      );
    }

    // ── Roles View ────────────────────────────────────────────────────────────

    function RolesView({ users }) {
      return (
        <div className="panel">
          <div className="panel-head"><span className="panel-title">Role Definitions</span></div>
          {ROLES.map(role => {
            const count = users.filter(u => u.role === role).length;
            return (
              <div className="role-row" key={role}>
                <div style={{ minWidth: 110 }}>
                  <RoleBadge role={role} />
                  <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 5 }}>{count} user{count !== 1 ? "s" : ""}</div>
                </div>
                <div className="role-perms">
                  {ROLE_PERMS[role].map(p => <span key={p} className="perm-tag">{p}</span>)}
                </div>
              </div>
            );
          })}
          <div style={{ padding: "12px 18px", borderTop: "1px solid #eee", fontSize: 11, color: "var(--muted)" }}>
            Role permissions are system-defined. Contact a system administrator to request changes.
          </div>
        </div>
      );
    }

    // ── Logs View ─────────────────────────────────────────────────────────────

    function LogsView({ logs }) {
      const [search, setSearch] = useState("");
      const filtered = [...logs].reverse().filter(l =>
        !search || l.user.includes(search) || l.action.includes(search.toUpperCase()) || l.detail.toLowerCase().includes(search.toLowerCase())
      );

      return (
        <div className="panel">
          <div className="panel-head">
            <span className="panel-title">Activity Log ({filtered.length})</span>
            <input style={{ width: 200 }} placeholder="Filter logs…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          {filtered.length === 0
            ? <div className="empty">No log entries match.</div>
            : (
              <table>
                <thead><tr><th>#</th><th>Timestamp</th><th>User</th><th>Action</th><th>Detail</th></tr></thead>
                <tbody>
                  {filtered.map((log, i) => (
                    <tr key={log.id}>
                      <td style={{ color:"var(--muted)", fontFamily:"var(--mono)", fontSize:11 }}>{String(filtered.length - i).padStart(4,"0")}</td>
                      <td><span className="log-ts">{log.ts}</span></td>
                      <td style={{ fontFamily:"var(--mono)", fontSize:12 }}>{log.user}</td>
                      <td>
                        <span className="log-action" style={{ background:(ACTION_COLOR[log.action]||"#888")+"22", color:ACTION_COLOR[log.action]||"#888" }}>
                          {log.action}
                        </span>
                      </td>
                      <td style={{ color:"#555", fontSize:12 }}>{log.detail}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
        </div>
      );
    }

    // ── Analytics View ────────────────────────────────────────────────────────

    function AnalyticsView({ users, logs }) {
      const byRole   = ROLES.map(r => ({ label: r, val: users.filter(u => u.role === r).length }));
      const byStatus = ["Active","Inactive","Pending"].map(s => ({ label: s, val: users.filter(u => u.status === s).length }));
      const actionCounts = Object.keys(ACTION_COLOR)
        .map(a => ({ label: a, val: logs.filter(l => l.action === a).length }))
        .sort((a,b) => b.val - a.val);
      const maxA = Math.max(...actionCounts.map(a => a.val), 1);

      return (
        <>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20 }}>
            <div className="panel">
              <div className="panel-head"><span className="panel-title">Users by Role</span></div>
              <div className="panel-body">
                {byRole.map(({ label, val }) => (
                  <div className="bar-row" key={label}>
                    <div className="bar-label">{label}</div>
                    <div className="bar-track"><div className="bar-fill" style={{ width:`${(val/Math.max(users.length,1))*100}%` }} /></div>
                    <div className="bar-val">{val}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-head"><span className="panel-title">Users by Status</span></div>
              <div className="panel-body">
                {byStatus.map(({ label, val }) => (
                  <div className="bar-row" key={label}>
                    <div className="bar-label">{label}</div>
                    <div className="bar-track">
                      <div className="bar-fill" style={{
                        width:`${(val/Math.max(users.length,1))*100}%`,
                        background: label==="Active" ? "#1a6a2a" : label==="Pending" ? "#c09020" : "#bbb"
                      }} />
                    </div>
                    <div className="bar-val">{val}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div className="panel">
            <div className="panel-head"><span className="panel-title">Log Action Breakdown</span></div>
            <div className="panel-body">
              {actionCounts.map(({ label, val }) => (
                <div className="bar-row" key={label}>
                  <div className="bar-label">{label}</div>
                  <div className="bar-track">
                    <div className="bar-fill" style={{ width:`${(val/maxA)*100}%`, background:ACTION_COLOR[label]||"var(--accent)" }} />
                  </div>
                  <div className="bar-val">{val}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      );
    }

    // ── App Shell ─────────────────────────────────────────────────────────────

    const NAV = [
      { id:"dashboard", label:"Dashboard",   icon:"▦", section:"main" },
      { id:"users",     label:"Users",       icon:"⊞", section:"main" },
      { id:"roles",     label:"Roles",       icon:"◈", section:"main" },
      { id:"logs",      label:"Activity Log",icon:"≡", section:"system" },
      { id:"analytics", label:"Analytics",   icon:"◫", section:"system" },
    ];

    function App() {
      const [authed, setAuthed]           = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [view, setView]               = useState("dashboard");
      const [users, setUsers]             = useState(INITIAL_USERS);
      const [logs, setLogs]               = useState(INITIAL_LOGS);

      function addLog(action, detail) {
        setLogs(l => [...l, { id: Date.now(), ts: now(), user: currentUser?.email || "system", action, detail }]);
      }

      function handleLogin(user) {
        setCurrentUser(user);
        setAuthed(true);
        setLogs(l => [...l, { id: Date.now(), ts: now(), user: user.email, action: "LOGIN", detail: "Successful login via Admin Panel" }]);
      }

      function handleLogout() {
        addLog("LOGOUT", "Session ended via Admin Panel");
        setAuthed(false);
        setCurrentUser(null);
        setView("dashboard");
      }

      if (!authed) return <LoginScreen onLogin={handleLogin} />;

      const mainNav = NAV.filter(n => n.section === "main");
      const sysNav  = NAV.filter(n => n.section === "system");
      const dateStr = new Date().toLocaleDateString("en-US", { weekday:"short", year:"numeric", month:"short", day:"numeric" });

      return (
        <div className="layout">
          <aside className="sidebar">
            <div className="sidebar-brand"><span>●</span> Admin Panel System</div>

            <div className="sidebar-section">
              <div className="sidebar-label">Main</div>
              {mainNav.map(n => (
                <div key={n.id} className={`nav-item${view===n.id?" active":""}`} onClick={() => setView(n.id)}>
                  <span className="nav-icon">{n.icon}</span>{n.label}
                </div>
              ))}
            </div>

            <div className="sidebar-section">
              <div className="sidebar-label">System</div>
              {sysNav.map(n => (
                <div key={n.id} className={`nav-item${view===n.id?" active":""}`} onClick={() => setView(n.id)}>
                  <span className="nav-icon">{n.icon}</span>{n.label}
                </div>
              ))}
            </div>

            <div className="sidebar-user">
              <strong>{currentUser?.name}</strong>
              {currentUser?.role} · {currentUser?.email}
              <div style={{ marginTop: 10 }}>
                <button className="btn btn-sm" style={{ background:"transparent", border:"1px solid #333", color:"#888", width:"100%" }} onClick={handleLogout}>
                  Sign Out
                </button>
              </div>
            </div>
          </aside>

          <div className="main">
            <div className="topbar">
              <span className="topbar-title">{TITLES[view]}</span>
              <span className="topbar-meta">{dateStr}</span>
            </div>
            <div className="content">
              {view === "dashboard"  && <Dashboard  users={users} logs={logs} />}
              {view === "users"      && <UsersView  users={users} setUsers={setUsers} addLog={addLog} />}
              {view === "roles"      && <RolesView  users={users} />}
              {view === "logs"       && <LogsView   logs={logs} />}
              {view === "analytics"  && <AnalyticsView users={users} logs={logs} />}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
